<section class="seo-diagnose diagnose diagnose--embedded" id="diagnose" aria-labelledby="diagnose-title">
  <p class="services__diagnose-label">Проблемомер</p>
  <h2 class="section-title" id="diagnose-title" style="font-size: var(--text-xl);">Проверьте свой случай</h2>
  <p class="diagnose__intro">{{DIAGNOSE_INTRO}}</p>
  <div class="diagnose__shell" id="diagnose-app" data-current-node="q1_signal">
    <div class="diagnose__topline">
      <p class="diagnose__counter" id="diagnose-counter">Вопрос 1 из 10</p>
    </div>
    <div class="diagnose__progress-track" aria-hidden="true">
      <div class="diagnose__progress-bar" id="diagnose-progress-bar"></div>
    </div>
    <div class="diagnose__layout">
      <div class="diagnose__main">
        <div class="diagnose__flow">
          <div class="diagnose__stage" aria-live="polite">
            <p class="diagnose__step-label" id="diagnose-step-label">Симптом</p>
            <h4 class="diagnose__question" id="diagnose-question">Что беспокоит сильнее всего?</h4>
            <p class="diagnose__lead" id="diagnose-lead" hidden></p>
            <div class="diagnose__chips" id="diagnose-options" role="group" aria-labelledby="diagnose-question"></div>
            <p class="diagnose__hint" id="diagnose-hint"></p>
            <div class="diagnose__controls">
              <button type="button" class="btn btn--ghost diagnose__back" id="diagnose-back" disabled>Назад</button>
              <button type="button" class="btn btn--primary diagnose__next" id="diagnose-next" disabled>Далее <span class="btn__arrow" aria-hidden="true">→</span></button>
            </div>
          </div>
        </div>
        <div class="diagnose__result" id="diagnose-result" hidden aria-live="polite"></div>
      </div>
      <aside class="diagnose__readiness" id="diagnose-readiness" aria-live="polite">
        <div class="diagnose__gauge" role="img" aria-labelledby="diagnose-gauge-value diagnose-gauge-note">
          <svg class="diagnose__gauge-svg" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="diagnose__gauge-track" cx="60" cy="60" r="52"></circle>
            <circle class="diagnose__gauge-fill" id="diagnose-gauge-fill" cx="60" cy="60" r="52"></circle>
          </svg>
          <p class="diagnose__gauge-value" id="diagnose-gauge-value">0%</p>
        </div>
        <p class="diagnose__gauge-title">Точность подбора</p>
        <p class="diagnose__gauge-note" id="diagnose-gauge-note">Ответьте на вопросы — покажем, насколько однозначна рекомендация.</p>
        <ul class="diagnose__gauge-log" id="diagnose-gauge-log"></ul>
      </aside>
    </div>
  </div>
</section>
